<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Uzun Çarşı | Sanal Mağaza</title>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>

    <div id="uiOverlay" class="hidden">

      <div id="sideMenu">
        <button id="closeBtn" class="icon-btn">✕ Kapat</button>
        <div class="product-image-placeholder"></div>
        <h2 id="productBrand">Marka Adı</h2>
        <h1 id="productName">Ürün Adı</h1>
        <p id="productDesc">Bu ürün hakkında kısa ve etkili bir açıklama metni burada yer alacak.</p>
        <h3 id="productPrice">₺0.00</h3>
        <button id="buyBtn">Sepete Ekle</button>
      </div>
    </div>

    <div id="crosshair"></div>

    <!-- Editor Controls -->
    <div id="editorControls" class="hidden glass-panel">
        <button id="addProductBtn">Ürün / Obje Ekle</button>
        <hr style="border: 1px solid var(--border-color); width: 100%; margin: 5px 0;">
        <button id="paintModeBtn" style="color: #64ffda;">Boya (Renk Değiştir)</button>
    </div>

    <button id="editorToggleBtn" class="fab-btn">Editör Modu</button>
    
    <div id="buildModeHint" class="hidden">Yerleştirmek için zemine tıklayın. Çıkmak için ESC.</div>

    <!-- Product Box Assignment UI -->
    <div id="assignFormOverlay" class="hidden glass-panel">
        <div class="form-container">
            <h2>Ürün Bilgilerini Gir</h2>
            
            <input type="text" id="newBrand" placeholder="Marka (Örn: Nike)" />
            <input type="text" id="newName" placeholder="Ürün Adı (Örn: Siyah T-Shirt)" />
            <input type="text" id="newPrice" placeholder="Fiyat (Örn: 299 TL)" />
            <textarea id="newDesc" placeholder="Ürün Açıklaması..."></textarea>
            
            <div class="form-actions" style="margin-top: 10px;">
                <button id="saveBoxBtn" class="primary-btn">Kaydet</button>
                <button id="cancelBoxBtn" class="secondary-btn">İptal</button>
            </div>
            
            <hr style="border-color: var(--border-color); width: 100%; margin: 5px 0;">
            <button id="deleteBoxBtn" class="danger-btn">Bu Objeyi Sil</button>
        </div>
    </div>

    <!-- Global Color Editor UI -->
    <div id="colorEditorOverlay" class="hidden glass-panel">
        <div class="form-container" style="width: 300px;">
            <h2 id="colorEditorTitle">Renk Düzenle</h2>
            <p id="colorEditorTargetName" style="font-size: 12px; color: var(--text-secondary); margin-bottom: 15px;">Obje Seçilmedi</p>
            
            <div class="color-picker">
                <label>Yeni Renk:</label>
                <input type="color" id="meshColorInput" value="#ffffff" style="width: 100%; height: 50px; cursor: pointer; border: none; border-radius: 8px;" />
            </div>
            
            <div class="form-actions" style="margin-top: 20px;">
                <button id="saveColorBtn" class="primary-btn">Kaydet</button>
                <button id="cancelColorBtn" class="secondary-btn">Kapat</button>
                <button id="resetColorBtn" class="danger-btn">Sıfırla</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
